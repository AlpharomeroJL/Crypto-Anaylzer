# CI: same checks as release validate job (minus tag version check). Keep in sync with release.yml validate-and-build.
name: CI
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Lockfile drift check
        run: uv lock --check

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock', 'pyproject.toml') }}

      - name: Install dependencies
        run: uv sync --frozen

      - name: Entrypoint (module)
        run: uv run python -m crypto_analyzer --help

      - name: Entrypoint (console script)
        run: uv run crypto-analyzer --help

      - name: CLI smoke
        run: uv run crypto-analyzer doctor --ci

      - name: CI smoke (synthetic, no network)
        run: uv run crypto-analyzer smoke --ci
        env:
          CRYPTO_ANALYZER_NO_NETWORK: "1"

      - name: Ruff check
        run: uv run ruff check crypto_analyzer cli tests tools

      - name: Ruff format check
        run: uv run ruff format --check crypto_analyzer cli tests tools

      - name: Pytest (default: no slow, no network)
        env:
          STRICT_SYSPATH_GUARD: "1"
        run: uv run python -m pytest -m "not slow and not network" -q --tb=short
        timeout-minutes: 20

      - name: Markdown link check
        run: uv run python tools/check_md_links.py

      - name: Dependency boundary check
        run: uv run python tools/check_import_boundaries.py
